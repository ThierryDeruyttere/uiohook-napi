name: Build prebuilds

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: darwin-arm64
          - os: macos-14
            platform: darwin-x64
            prebuild_args: --arch x64
          - os: ubuntu-22.04
            platform: linux-x64
          - os: ubuntu-22.04-arm
            platform: linux-arm64
          - os: windows-2022
            platform: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxrandr-dev libxtst-dev libxt-dev libxcb-xkb-dev libxkbcommon-x11-dev libxkbcommon-dev

      - run: npm install --ignore-scripts
      - run: npx prebuildify --napi --strip ${{ matrix.prebuild_args }}

      - uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}
          path: prebuilds/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --ignore-scripts
      - run: npx tsc

      - uses: actions/download-artifact@v4
        with:
          path: prebuilds/
          pattern: prebuild-*
          merge-multiple: true

      - name: List prebuilds
        run: find prebuilds -type f

      - name: Commit prebuilds and dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f prebuilds/ dist/
          git commit -m "Add prebuilds and dist for ${{ github.ref_name }}"
          git push origin HEAD:refs/heads/release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Prebuilt binaries for all platforms included in the \`release\` branch."
